name: Publish npm

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      PACKAGE_NAME: "@eshen_fox_mie/agent-ready"
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm install
      - run: npm run check
      - run: npm test

      - name: Validate release tag
        run: |
          package_version="$(node -p "require('./package.json').version")"
          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"

          if [ -n "${RELEASE_TAG:-}" ]; then
            tag_version="${RELEASE_TAG#v}"
            if [ "$tag_version" != "$package_version" ]; then
              echo "Release tag $RELEASE_TAG does not match package.json version $package_version."
              exit 1
            fi
          fi

      - name: Skip if version is already published
        id: published
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "already_published=true" >> "$GITHUB_OUTPUT"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published."
          else
            echo "already_published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish package
        if: steps.published.outputs.already_published != 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
